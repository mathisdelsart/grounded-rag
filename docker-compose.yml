services:
  app:
    build: .
    ports:
      - "8000:8000"   # FastAPI / uvicorn
    # Load secrets/settings (e.g. OPENAI_API_KEY) from .env when present. The
    # `environment` block below takes precedence, so QDRANT_URL stays correct
    # inside the container even if .env sets it for local (host) use.
    env_file:
      - path: .env
        required: false
    environment:
      QDRANT_URL: http://qdrant:6333
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=4).status == 200 else 1)
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - grounded-rag

  ui:
    build: .
    command:
      - streamlit
      - run
      - ui/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
    ports:
      - "8501:8501"   # Streamlit web UI
    env_file:
      - path: .env
        required: false
    environment:
      API_BASE_URL: http://app:8000
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - grounded-rag

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # HTTP / REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      # The qdrant image ships neither curl nor wget, so probe the REST port
      # over a raw TCP connection using the bundled bash.
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped
    networks:
      - grounded-rag

networks:
  grounded-rag:

volumes:
  qdrant_storage:
